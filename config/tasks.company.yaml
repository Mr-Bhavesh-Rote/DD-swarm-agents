# config/tasks.company.yaml
# Task DAG for the "company" subject type. Each task binds to one agent (by name in
# agents.company.yaml) and declares its `depends_on` edges and `expected_output`.
# The loader merges agents + tasks into the normalized WorkflowPlan (§5.2).

overview_ownership_research:
  agent: overview_ownership_researcher
  depends_on: []
  expected_output: findings[] with source_urls + narrative_markdown covering brief subject overview, corporate structure, ownership, key management, and any state/political ties or PEP exposure.

sanctions_legal_research:
  agent: sanctions_legal_researcher
  depends_on: []
  expected_output: findings[] with source_urls + narrative_markdown covering sanctions/export-controls, AML, litigation, criminal cases, and regulatory enforcement with dates/jurisdictions/status.

adverse_conduct_research:
  agent: adverse_conduct_researcher
  depends_on: []
  expected_output: findings[] with source_urls + narrative_markdown covering corruption/bribery/fraud, human-rights/labor abuses, and controversial/dual-use/military products and end-use.

adverse_media_esg_research:
  agent: adverse_media_esg_researcher
  depends_on: []
  expected_output: findings[] with source_urls + narrative_markdown covering adverse media, reputational controversies, environmental harm/ESG, and risky counterparty/jurisdictional exposure.

pep_ownership_risk_research:
  agent: pep_ownership_risk_researcher
  depends_on: []
  expected_output: findings[] with source_urls + narrative_markdown covering politically exposed persons, state-owned enterprise ties, and ownership structures indicating heightened risk.

risk_aggregation:
  agent: risk_aggregator
  depends_on: [sanctions_legal_research, adverse_conduct_research, adverse_media_esg_research]
  expected_output: derogatory/adverse findings bucketed by risk category with severity ratings.
