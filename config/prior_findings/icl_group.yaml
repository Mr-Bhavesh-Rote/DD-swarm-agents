# Prior findings from manual due diligence that automated research has not surfaced.
# These are injected into the synthesizer context so they appear in the final report.
# Each finding must have: claim, tag (CONFIRMED/REPORTED/UNVERIFIED), category, source_description.

subject_patterns:
  - "ICL Group"
  - "ICL Group Ltd"
  - "Israel Chemicals"

findings:
  - claim: "ICL-IP AMERICA INC held US Army contract W52P1J20R3006 to supply white phosphorus for weapons manufacturing (2020-2025). GAO denied a protest of this contract award on July 17, 2020, confirming the contract relationship. Supply chain: Bayer → ICL-IP America → US Army (Pine Bluff Arsenal) → Israeli military."
    tag: "CONFIRMED"
    category: "Weapons / Military Supply Chain"
    source_description: "GAO protest decision (July 17, 2020, contract W52P1J20R3006) — primary government source. Also: FPDS contract records."
    must_include: true

  - claim: "Phoenix Holdings Ltd. holds approximately 5.01-6.39% of ICL Group shares. AP Investments III Ltd. (UK), which controls Phoenix Financial, has been associated with Jared Kushner (Trump son-in-law, former White House official). Connection not confirmed or denied from public sources."
    tag: "UNVERIFIED"
    category: "PEP / Ownership Risk"
    source_description: "Prior manual due diligence (January 2026); requires verification against Phoenix Holdings corporate registry and AP Investments III Ltd. filings at Companies House (UK)"
    must_include: true
    include_in_sections:
      - "company_ownership"
      - "pep_status"

  - claim: "Israeli Supreme Court ordered ICL's Dead Sea Works to pay NIS 250 million (~$68 million USD) in water tariff fees (December 2025). NOTE: If sources [9] or [10] in the source list reference this ruling, cite them with [n]."
    tag: "CONFIRMED"
    category: "Legal & Litigation"
    source_description: "Israeli Supreme Court ruling (December 2025, case reference TDI #177759). Check source list for 'NIS 250' or 'Dead Sea water' or 'Supreme Court' — if found, cite that source [n]."
    must_include: true

  - claim: "Israel's Ministry of Environmental Protection (Green Police) opened a second criminal investigation following a June 2022 Dead Sea brine leak, in addition to the ongoing criminal investigation related to the 2017 Ashalim Creek spill."
    tag: "REPORTED"
    category: "Legal & Litigation"
    source_description: "ICL Form 20-F self-disclosure; status of second investigation not confirmed in available sources"
