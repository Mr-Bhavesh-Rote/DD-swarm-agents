# Orchestrates the full stack: postgres, redis, backend API, background worker, frontend.
# Langfuse is optional/self-host — point LANGFUSE_HOST at cloud or uncomment the service.

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: deepdd
      POSTGRES_PASSWORD: deepdd
      POSTGRES_DB: deepdd
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepdd"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: ./backend
    command: alembic upgrade head
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://deepdd:deepdd@postgres:5432/deepdd
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://deepdd:deepdd@postgres:5432/deepdd
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5555,http://localhost:8080
    ports: ["8000:8000"]
    volumes:
      - ./config:/config:ro
      - exports:/var/deepdd
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build: ./backend
    command: python worker.py
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://deepdd:deepdd@postgres:5432/deepdd
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./config:/config:ro
      - exports:/var/deepdd
    depends_on:
      backend:
        condition: service_started

  frontend:
    build: ./frontend
    ports: ["8080:80"]
    depends_on:
      - backend

  # --- Optional self-hosted Langfuse (otherwise set LANGFUSE_HOST to cloud) ---
  # langfuse:
  #   image: langfuse/langfuse:3
  #   ports: ["3000:3000"]
  #   environment:
  #     DATABASE_URL: postgresql://deepdd:deepdd@postgres:5432/langfuse
  #     NEXTAUTH_SECRET: change-me
  #     SALT: change-me
  #   depends_on: [postgres]

volumes:
  pgdata:
  exports:
